name: Run Masters Draw

on:
  schedule:
    # 8:00 PM ET on April 7 = midnight UTC April 8
    - cron: '0 0 8 4 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-draw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run draw
        run: node run-draw.js
      - name: Commit result
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pool-data.json
          git diff --staged --quiet || git commit -m "Draw complete: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
