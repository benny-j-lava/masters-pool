name: Update Masters Scores

on:
  schedule:
    # Every 30 min, 7am-10pm ET (11:00-02:00 UTC), Thu Apr 9 - Sun Apr 12
    - cron: '0,30 11-23 9-12 4 *'
    - cron: '0,30 0-2 10-13 4 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch scores
        run: node fetch-scores.js
      - name: Commit if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pool-data.json
          git diff --staged --quiet || git commit -m "Update scores $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
